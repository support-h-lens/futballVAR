<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>1/2 Lens VAR</title>
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#0c1a2b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="1/2 Lens VAR" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="stylesheet" href="/theme.css" />
<style>
  body{min-height:100vh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:22px 26px}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;padding:24px}
  .replay{position:relative;border:none;cursor:pointer;color:#fff;background:var(--accent);
    width:min(72vw,300px);height:min(72vw,300px);border-radius:50%;
    box-shadow:0 30px 60px -24px rgba(47,107,255,.85), inset 0 1px 0 rgba(255,255,255,.25);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:.14s ease}
  .replay .ic{font-size:30px;line-height:1;opacity:.95}
  .replay .lab{font-size:24px;font-weight:650;letter-spacing:-.01em}
  .replay .sub{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;opacity:.8}
  .replay:hover:not(:disabled){transform:translateY(-2px)}
  .replay:active:not(:disabled){transform:scale(.975)}
  .replay:disabled{background:#c7d0db;box-shadow:none;cursor:not-allowed}
  .ring{position:absolute;inset:-10px;border-radius:50%;border:1px solid var(--line)}
  .clips{display:inline-flex;align-items:center;gap:10px}
  .clips .num{background:var(--ink);color:#fff;border-radius:999px;padding:2px 10px;font-size:12.5px;font-weight:600}
  .foot{padding:18px 26px;color:var(--faint);font-size:12px;text-align:center}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brandmark">
      <svg class="glyph" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <circle cx="16" cy="16" r="12.6" stroke="currentColor" stroke-width="2.4"/>
        <path d="M16 3.4a12.6 12.6 0 0 0 0 25.2z" fill="currentColor"/>
        <circle cx="16" cy="16" r="3.5" fill="var(--surface)"/>
      </svg>
      <div class="brandtext"><h1>1/2 Lens VAR</h1><span>Instant Replay</span></div>
    </div>
    <span class="pill"><span class="dot" id="dot"></span><span id="status">Connecting…</span></span>
  </div>

  <div class="center">
    <button class="replay" id="replay" disabled>
      <span class="ring"></span>
      <span class="ic">⟳</span><span class="lab">Replay</span><span class="sub">last 30 sec</span>
    </button>
    <a class="btn clips" href="/clips">View clips <span class="num" id="count">0</span></a>
  </div>
  <div class="foot">Tap replay to save the last 30 seconds.</div>

  <div class="toast" id="toast"></div>
<script>
(() => {
  const $=id=>document.getElementById(id);
  const btn=$('replay'),dot=$('dot'),statusEl=$('status'),toast=$('toast'),count=$('count');
  let capturing=false;
  function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.classList.remove('show'),2600);}
  async function refreshCount(){ try{ const l=await(await fetch('/api/clips')).json(); count.textContent=l.length; }catch(e){} }
  async function poll(){
    try{ const s=await(await fetch('/api/status')).json(); capturing=s.capturing;
      if(!s.camera){dot.classList.remove('live');statusEl.textContent='No camera';btn.disabled=true;}
      else if(s.capturing){dot.classList.add('live');statusEl.textContent='Live';btn.disabled=false;}
      else{dot.classList.remove('live');statusEl.textContent='Starting…';btn.disabled=true;}
    }catch(e){statusEl.textContent='Offline';dot.classList.remove('live');btn.disabled=true;}
  }
  setInterval(poll,2000);poll();refreshCount();setInterval(refreshCount,5000);
  btn.addEventListener('click',async()=>{
    if(btn.disabled) return; const lab=btn.querySelector('.lab'); const t=lab.textContent; btn.disabled=true; lab.textContent='Saving…';
    try{ const r=await(await fetch('/api/replay')).json(); if(r.error) throw new Error(r.error); showToast('✓ Replay saved to Clips'); refreshCount(); }
    catch(e){ showToast(e.message||'Not ready yet'); }
    finally{ lab.textContent=t; btn.disabled=!capturing; }
  });
  document.addEventListener('keydown',e=>{ if(e.key==='r'||e.key==='R') btn.click(); });
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }
})();
</script>
</body>
</html>
